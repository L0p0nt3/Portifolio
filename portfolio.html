<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lucas Loponte — Desenvolvedor Full-Stack & Automação</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800&family=Geist+Mono:wght@400;500&display=swap"
    rel="stylesheet" />

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js"
    integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"
    crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"
    integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"
    crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
    integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"
    crossorigin="anonymous"></script>

  <style>
    :root {
      --bg: #0a0a0a;
      --bg-elev: #111111;
      --bg-card: #0f0f0f;
      --border: rgba(255, 255, 255, 0.08);
      --border-strong: rgba(255, 255, 255, 0.16);
      --fg: #ededed;
      --fg-dim: #a1a1a1;
      --fg-mute: #6b6b6b;
      --accent: #10b981;
      --accent-soft: rgba(16, 185, 129, 0.12);
      --accent-glow: rgba(16, 185, 129, 0.35);
    }

    [data-theme="light"] {
      --bg: #fafafa;
      --bg-elev: #ffffff;
      --bg-card: #ffffff;
      --border: rgba(0, 0, 0, 0.08);
      --border-strong: rgba(0, 0, 0, 0.18);
      --fg: #0a0a0a;
      --fg-dim: #525252;
      --fg-mute: #8a8a8a;
      --accent: #059669;
      --accent-soft: rgba(5, 150, 105, 0.10);
      --accent-glow: rgba(5, 150, 105, 0.25);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      background: var(--bg);
      color: var(--fg);
      font-family: 'Geist', -apple-system, BlinkMacSystemFont, sans-serif;
      font-feature-settings: "ss01", "cv11";
      -webkit-font-smoothing: antialiased;
      line-height: 1.5;
      overflow-x: hidden;
      transition: background 0.4s ease, color 0.4s ease;
    }

    .mono {
      font-family: 'Geist Mono', ui-monospace, monospace;
    }

    /* ------------ NAV ------------ */
    .nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      padding: 18px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      background: color-mix(in srgb, var(--bg) 60%, transparent);
      border-bottom: 1px solid transparent;
      transition: border-color 0.3s ease, background 0.3s ease;
    }

    .nav.scrolled {
      border-bottom-color: var(--border);
    }

    .nav-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 600;
      font-size: 15px;
      letter-spacing: -0.01em;
    }

    .nav-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 12px var(--accent-glow);
    }

    .nav-links {
      display: flex;
      gap: 28px;
      align-items: center;
    }

    .nav-link {
      color: var(--fg-dim);
      text-decoration: none;
      font-size: 14px;
      font-weight: 400;
      transition: color 0.2s ease;
    }

    .nav-link:hover {
      color: var(--fg);
    }

    .nav-cta {
      padding: 8px 16px;
      background: var(--fg);
      color: var(--bg);
      border-radius: 999px;
      font-size: 13px;
      font-weight: 500;
      text-decoration: none;
      transition: opacity 0.2s ease, transform 0.2s ease;
    }

    .nav-cta:hover {
      opacity: 0.85;
      transform: scale(0.97);
    }

    .lang-toggle {
      display: inline-flex;
      background: var(--bg-elev);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 3px;
      font-size: 11px;
      font-weight: 500;
      font-family: 'Geist Mono', monospace;
      letter-spacing: 0.05em;
    }

    .lang-toggle button {
      border: none;
      background: transparent;
      color: var(--fg-mute);
      padding: 4px 10px;
      border-radius: 999px;
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: inherit;
      font-size: inherit;
      font-weight: inherit;
    }

    .lang-toggle button.active {
      background: var(--fg);
      color: var(--bg);
    }

    .theme-toggle-btn {
      width: 32px;
      height: 32px;
      border: 1px solid var(--border);
      background: var(--bg-elev);
      border-radius: 50%;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--fg-dim);
      transition: all 0.2s ease;
    }

    .theme-toggle-btn:hover {
      color: var(--fg);
      border-color: var(--border-strong);
    }

    /* ------------ GLOBAL BACKGROUND ------------ */
    .site-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    .site-bg-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    .site-bg-grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 80px 80px;
      opacity: 0.18;
      mask-image: radial-gradient(ellipse at center, black 20%, transparent 75%);
      -webkit-mask-image: radial-gradient(ellipse at center, black 20%, transparent 75%);
    }

    .site-bg-overlay {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 50% 0%, transparent 0%, transparent 40%, color-mix(in srgb, var(--bg) 70%, transparent) 95%),
        linear-gradient(180deg, transparent 0%, color-mix(in srgb, var(--bg) 50%, transparent) 100%);
    }

    /* ensure all sections sit above the bg */
    .site-nav,
    main,
    footer {
      position: relative;
      z-index: 2;
    }

    /* ------------ HERO ------------ */
    .hero {
      position: relative;
      min-height: 100vh;
      display: flex;
      align-items: center;
      overflow: hidden;
    }

    .hero-canvas {
      display: none;
    }

    .hero-overlay {
      display: none;
    }

    .hero-grid {
      display: none;
    }

    .hero-inner {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
      padding: 120px 40px 80px;
    }

    .hero-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 6px 14px;
      background: var(--bg-elev);
      border: 1px solid var(--border);
      border-radius: 999px;
      font-family: 'Geist Mono', monospace;
      font-size: 12px;
      color: var(--fg-dim);
      margin-bottom: 32px;
      letter-spacing: 0.02em;
    }

    .hero-eyebrow::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
        box-shadow: 0 0 0 0 var(--accent-glow);
      }

      50% {
        opacity: 0.7;
        box-shadow: 0 0 0 6px transparent;
      }
    }

    .hero-devname {
      font-family: 'Geist Mono', monospace;
      font-size: clamp(14px, 1.4vw, 18px);
      color: var(--accent);
      letter-spacing: 0.02em;
      margin-bottom: 18px;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      text-shadow: 0 0 24px var(--accent-glow);
    }

    .hero-devname::before {
      content: '';
      width: 24px;
      height: 1px;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent-glow);
    }

    h1.hero-title {
      font-size: clamp(48px, 8vw, 104px);
      font-weight: 600;
      line-height: 0.98;
      letter-spacing: -0.04em;
      margin-bottom: 28px;
      max-width: 1000px;
    }

    .hero-title .accent {
      color: var(--accent);
      font-style: italic;
      font-weight: 500;
    }

    .hero-title .dim {
      color: var(--fg-mute);
    }

    .hero-sub {
      font-size: clamp(16px, 1.5vw, 19px);
      color: var(--fg-dim);
      max-width: 580px;
      margin-bottom: 48px;
      line-height: 1.55;
    }

    .hero-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 64px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 22px;
      border-radius: 999px;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.2s ease;
      border: 1px solid transparent;
      cursor: pointer;
      font-family: inherit;
    }

    .btn-primary {
      background: var(--fg);
      color: var(--bg);
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 24px color-mix(in srgb, var(--fg) 25%, transparent);
    }

    .btn-ghost {
      background: transparent;
      color: var(--fg);
      border-color: var(--border-strong);
    }

    .btn-ghost:hover {
      background: var(--bg-elev);
    }

    .btn .arrow {
      transition: transform 0.2s ease;
    }

    .btn:hover .arrow {
      transform: translateX(3px);
    }

    .hero-meta {
      display: flex;
      gap: 48px;
      flex-wrap: wrap;
      padding-top: 32px;
      border-top: 1px solid var(--border);
      max-width: 720px;
    }

    .hero-meta-item .label {
      font-family: 'Geist Mono', monospace;
      font-size: 11px;
      color: var(--fg-mute);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 6px;
    }

    .hero-meta-item .value {
      font-size: 14px;
      color: var(--fg);
      font-weight: 500;
    }

    .hero-meta-item .value .live-dot {
      display: inline-block;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--accent);
      margin-right: 6px;
      animation: pulse 2s ease-in-out infinite;
      vertical-align: middle;
    }

    .scroll-hint {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 2;
      font-family: 'Geist Mono', monospace;
      font-size: 11px;
      color: var(--fg-mute);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .scroll-hint::after {
      content: '';
      width: 1px;
      height: 24px;
      background: linear-gradient(to bottom, var(--fg-mute), transparent);
      animation: scroll-line 2s ease-in-out infinite;
    }

    @keyframes scroll-line {

      0%,
      100% {
        transform: scaleY(0.4);
        transform-origin: top;
      }

      50% {
        transform: scaleY(1);
      }
    }

    /* ------------ SECTION ------------ */
    section {
      position: relative;
    }

    .section {
      max-width: 1200px;
      margin: 0 auto;
      padding: 120px 40px;
    }

    .section-label {
      display: flex;
      align-items: center;
      gap: 12px;
      font-family: 'Geist Mono', monospace;
      font-size: 12px;
      color: var(--fg-mute);
      text-transform: uppercase;
      letter-spacing: 0.15em;
      margin-bottom: 32px;
    }

    .section-label::before {
      content: '';
      width: 24px;
      height: 1px;
      background: var(--fg-mute);
    }

    .section-heading {
      font-size: clamp(36px, 5vw, 56px);
      font-weight: 500;
      letter-spacing: -0.03em;
      line-height: 1.05;
      max-width: 800px;
      margin-bottom: 24px;
    }

    .section-heading .dim {
      color: var(--fg-mute);
    }

    .section-heading .accent {
      color: var(--accent);
      font-style: italic;
      font-weight: 400;
    }

    /* ------------ ABOUT ------------ */
    .about-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 64px;
      margin-top: 24px;
    }

    @media (min-width: 900px) {
      .about-grid {
        grid-template-columns: 1fr 1.4fr;
        gap: 80px;
      }
    }

    .about-portrait {
      position: sticky;
      top: 60px;
      margin-top: -32px;
      align-self: start;
    }

    .portrait-frame {
      aspect-ratio: 1 / 1;
      border-radius: 50%;
      border: 1px solid var(--border-strong);
      background: var(--bg-elev);
      overflow: hidden;
      position: relative;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), 0 0 120px var(--accent-glow);
      max-width: 480px;
      margin: 0 auto;
    }

    .portrait-frame::before {
      content: '';
      position: absolute;
      inset: -2px;
      border-radius: 50%;
      background: conic-gradient(from 0deg, var(--accent), transparent 25%, transparent 75%, var(--accent));
      z-index: -1;
      animation: rotate-border 8s linear infinite;
      filter: blur(2px);
      opacity: 0.7;
    }

    @keyframes rotate-border {
      to {
        transform: rotate(360deg);
      }
    }

    .portrait-frame img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 30%;
      transform: scale(1.05);
      display: block;
      transition: transform 0.7s cubic-bezier(0.23, 1, 0.32, 1);
    }

    .portrait-frame:hover img {
      transform: scale(1.12);
    }

    .portrait-frame::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: linear-gradient(180deg, transparent 50%, color-mix(in srgb, var(--bg) 70%, transparent) 100%);
      pointer-events: none;
    }

    .portrait-name {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin: 0 auto 24px auto;
      width: fit-content;
      font-family: 'Geist Mono', monospace;
      font-size: 14px;
      letter-spacing: 0.15em;
      color: var(--fg);
      background: var(--bg-elev);
      border: 1px solid var(--border-strong);
      padding: 8px 18px;
      border-radius: 999px;
      text-transform: uppercase;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4), 0 0 30px var(--accent-glow);
    }

    .portrait-name::before {
      content: '';
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 10px var(--accent-glow);
    }

    .about-portrait {
      position: relative;
    }

    .portrait-tag {
      margin-top: 16px;
      display: flex;
      justify-content: space-between;
      font-family: 'Geist Mono', monospace;
      font-size: 11px;
      color: var(--fg-mute);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .about-body p {
      font-size: 18px;
      color: var(--fg-dim);
      line-height: 1.7;
      margin-bottom: 20px;
    }

    .about-body p:first-of-type {
      font-size: 22px;
      color: var(--fg);
      line-height: 1.5;
      margin-bottom: 28px;
      font-weight: 400;
      letter-spacing: -0.01em;
    }

    .about-body strong {
      color: var(--fg);
      font-weight: 500;
    }

    .about-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1px;
      background: var(--border);
      margin-top: 48px;
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }

    .about-stat {
      background: var(--bg-card);
      padding: 24px 20px;
    }

    .about-stat .num {
      font-size: 32px;
      font-weight: 500;
      letter-spacing: -0.03em;
      line-height: 1;
      margin-bottom: 8px;
    }

    .about-stat .num .accent {
      color: var(--accent);
    }

    .about-stat .lbl {
      font-family: 'Geist Mono', monospace;
      font-size: 11px;
      color: var(--fg-mute);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    /* ------------ STACK ------------ */
    .stack {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      margin-top: 16px;
    }

    .stack-item {
      background: var(--bg-card);
      padding: 28px 24px;
      transition: background 0.3s ease;
      cursor: default;
    }

    .stack-item:hover {
      background: var(--bg-elev);
    }

    .stack-item .icon {
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 18px;
      color: var(--accent);
    }

    .stack-item h4 {
      font-size: 16px;
      font-weight: 500;
      letter-spacing: -0.01em;
      margin-bottom: 6px;
    }

    .stack-item p {
      font-size: 13px;
      color: var(--fg-dim);
      line-height: 1.5;
    }

    .stack-item .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 14px;
    }

    .stack-item .tag {
      font-family: 'Geist Mono', monospace;
      font-size: 11px;
      color: var(--fg-dim);
      padding: 3px 8px;
      border: 1px solid var(--border);
      border-radius: 999px;
    }

    /* ------------ PROJECTS ------------ */
    .projects-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      flex-wrap: wrap;
      gap: 24px;
      margin-bottom: 48px;
    }

    .projects-filters {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .filter {
      border: 1px solid var(--border);
      background: transparent;
      color: var(--fg-dim);
      font-size: 13px;
      padding: 6px 14px;
      border-radius: 999px;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.2s ease;
    }

    .filter:hover {
      color: var(--fg);
      border-color: var(--border-strong);
    }

    .filter.active {
      background: var(--fg);
      color: var(--bg);
      border-color: var(--fg);
    }

    .projects-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
    }

    @media (min-width: 700px) {
      .projects-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (min-width: 1100px) {
      .projects-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    .project {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
      cursor: pointer;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .project:hover {
      border-color: var(--border-strong);
      transform: translateY(-4px);
    }

    .project-thumb {
      aspect-ratio: 16 / 10;
      position: relative;
      background: var(--bg-elev);
      overflow: hidden;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .project-thumb-pattern {
      position: absolute;
      inset: 0;
      background-image: repeating-linear-gradient(45deg,
          transparent 0,
          transparent 14px,
          var(--border) 14px,
          var(--border) 15px);
      opacity: 0.5;
    }

    .project-thumb-glyph {
      position: relative;
      z-index: 1;
      font-family: 'Geist Mono', monospace;
      font-size: 64px;
      font-weight: 300;
      color: var(--fg-mute);
      letter-spacing: -0.05em;
      line-height: 1;
      transition: color 0.3s ease, transform 0.3s ease;
    }

    .project:hover .project-thumb-glyph {
      color: var(--accent);
      transform: scale(1.05);
    }

    .project-thumb-tag {
      position: absolute;
      top: 14px;
      left: 14px;
      font-family: 'Geist Mono', monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--fg-mute);
      background: var(--bg-card);
      border: 1px solid var(--border);
      padding: 4px 8px;
      border-radius: 999px;
      z-index: 2;
    }

    .project-thumb-status {
      position: absolute;
      top: 14px;
      right: 14px;
      z-index: 2;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-family: 'Geist Mono', monospace;
      font-size: 10px;
      color: var(--fg-dim);
      background: var(--bg-card);
      border: 1px solid var(--border);
      padding: 4px 8px;
      border-radius: 999px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .project-thumb-status .d {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
    }

    .project-thumb-status.archived .d {
      background: var(--fg-mute);
    }

    .project-body {
      padding: 22px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

          entries.forEach(e => {
            if (e.isIntersecting) {
              e.target.classList.add('in');
              io.unobserve(e.target);
            }
          });
        }, { threshold: 0.12, rootMargin: '0px 0px -60px 0px' });
        const observe = () => {
          document.querySelectorAll('.reveal:not(.in)').forEach(el => io.observe(el));
        };
        observe();
        // re-observe shortly after to catch DOM updates from filter changes
        const t1 = setTimeout(observe, 50);
        return () => { clearTimeout(t1); io.disconnect(); };
      }, [lang, filter]);

    /* ------------ SITE BACKGROUND ------------ */
    function SiteBackground() {
      const canvasRef = React.useRef(null);

      useEffect(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        let w, h, dpr;
        let particles = [];
        let orbs = [];
        const mouse = { x: -9999, y: -9999, active: false };
        let raf;

        const resize = () => {
          dpr = Math.min(window.devicePixelRatio || 1, 2);
          w = canvas.clientWidth;
          h = canvas.clientHeight;
          canvas.width = w * dpr;
          canvas.height = h * dpr;
          ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
          init();
        };

        const rand = (a, b) => a + Math.random() * (b - a);

        const init = () => {
          particles = [];
          const count = Math.min(160, Math.floor((w * h) / 11000));
          for (let i = 0; i < count; i++) {
            particles.push({
              x: Math.random() * w,
              y: Math.random() * h,
              vx: rand(-0.3, 0.3),
              vy: rand(-0.3, 0.3),
              r: rand(0.6, 1.8),
              base: rand(0.3, 0.85),
              hue: Math.random() < 0.15 ? 'white' : 'green',
            });
          }
          orbs = [];
        };

        const onMove = (e) => {
          const rect = canvas.getBoundingClientRect();
          mouse.x = e.clientX - rect.left;
          mouse.y = e.clientY - rect.top;
          mouse.active = true;
        };
        const onLeave = () => { mouse.active = false; mouse.x = -9999; mouse.y = -9999; };

        const draw = (tms) => {
          ctx.clearRect(0, 0, w, h);

          // PARTICLES — drift around AND scale/brighten near mouse (magnifier effect)
          for (let i = 0; i < particles.length; i++) {
            const p = particles[i];

            // gentle drift
            p.x += p.vx;
            p.y += p.vy;

            // tiny ambient noise so they don't go static
            p.vx += (Math.random() - 0.5) * 0.02;
            p.vy += (Math.random() - 0.5) * 0.02;

            // soft speed cap
            const sp = Math.hypot(p.vx, p.vy);
            if (sp > 0.5) { p.vx = (p.vx / sp) * 0.5; p.vy = (p.vy / sp) * 0.5; }

            // wrap edges
            if (p.x < -20) p.x = w + 20;
            if (p.x > w + 20) p.x = -20;
            if (p.y < -20) p.y = h + 20;
            if (p.y > h + 20) p.y = -20;

            // proximity factor for magnifier effect
            let factor = 0;
            if (mouse.active) {
              const dx = mouse.x - p.x, dy = mouse.y - p.y;
              const d = Math.hypot(dx, dy);
              if (d < 200) factor = 1 - d / 200;
            }

            const r = p.r * (1 + factor * 2.2);
            const alpha = Math.min(1, p.base + factor * 0.6);

            const color = p.hue === 'white'
              ? `rgba(255,255,255,${alpha})`
              : `rgba(16,185,129,${alpha})`;
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
            ctx.fill();

            // connect close particles — line strength scales near mouse
            for (let j = i + 1; j < particles.length; j++) {
              const q = particles[j];
              const dx = p.x - q.x, dy = p.y - q.y;
              const d2 = dx * dx + dy * dy;
              if (d2 < 11000) {
                let lineFactor = 0;
                if (mouse.active) {
                  const mx = (p.x + q.x) / 2 - mouse.x;
                  const my = (p.y + q.y) / 2 - mouse.y;
                  const md = Math.hypot(mx, my);
                  if (md < 200) lineFactor = 1 - md / 200;
                }
                const a = (1 - d2 / 11000) * (0.12 + lineFactor * 0.55);
                ctx.strokeStyle = `rgba(16,185,129,${a})`;
                ctx.lineWidth = 0.5 + lineFactor * 1.2;
                ctx.beginPath();
                ctx.moveTo(p.x, p.y);
                ctx.lineTo(q.x, q.y);
                ctx.stroke();
              }
            }

            // line from particle to mouse cursor when near
            if (mouse.active) {
              const dx = mouse.x - p.x, dy = mouse.y - p.y;
              const d = Math.hypot(dx, dy);
              if (d < 180) {
                const a = (1 - d / 180) * 0.7;
                ctx.strokeStyle = `rgba(16,185,129,${a})`;
                ctx.lineWidth = 0.8 + (1 - d / 180) * 1.2;
                ctx.beginPath();
                ctx.moveTo(p.x, p.y);
                ctx.lineTo(mouse.x, mouse.y);
                ctx.stroke();
              }
            }
          }

          // mouse cursor node — draws a bright dot at the mouse
          if (mouse.active) {
            ctx.fillStyle = 'rgba(16,185,129,0.95)';
            ctx.beginPath();
            ctx.arc(mouse.x, mouse.y, 3, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = 'rgba(16,185,129,0.5)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.arc(mouse.x, mouse.y, 8, 0, Math.PI * 2);
            ctx.stroke();
          }

          // soft mouse glow
          if (mouse.active) {
            const g = ctx.createRadialGradient(mouse.x, mouse.y, 0, mouse.x, mouse.y, 220);
            g.addColorStop(0, 'rgba(16,185,129,0.16)');
            g.addColorStop(1, 'rgba(16,185,129,0)');
            ctx.fillStyle = g;
            ctx.fillRect(0, 0, w, h);
          }

          raf = requestAnimationFrame(draw);
        };

        resize();
        window.addEventListener('resize', resize);
        canvas.addEventListener('mousemove', onMove);
        canvas.addEventListener('mouseleave', onLeave);
        // also listen on window so it works through overlay layers
        window.addEventListener('mousemove', onMove);
        raf = requestAnimationFrame(draw);

        return () => {
          cancelAnimationFrame(raf);
          window.removeEventListener('resize', resize);
          canvas.removeEventListener('mousemove', onMove);
          canvas.removeEventListener('mouseleave', onLeave);
          window.removeEventListener('mousemove', onMove);
        };
      }, []);

      return (
        <div className="site-bg" aria-hidden="true">
          <canvas ref={canvasRef} className="site-bg-canvas" />
          <div className="site-bg-grid" />
          <div className="site-bg-overlay" />
        </div>
      );
    }
